<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Thread Blocking Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f4f4f4;
        }

        .container {
            background: white;
            width: 500px;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 20px;
            color: #222;
        }

        p {
            color: #555;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        #blockBtn {
            background: #ff4d4d;
            color: white;
        }

        #blockBtn:hover {
            background: #e63939;
        }

        #normalBtn {
            background: #2563eb;
            color: white;
        }

        #normalBtn:hover {
            background: #1d4ed8;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Main Thread Blocking Demo</h1>
        <p>
            Click the red button to block the JavaScript main thread for 5 seconds.
            During this time, the blue button will stop responding.
            If the background color changes, it means the main thread is free.
        </p>
        <div class="btn-container">
            <button id="blockBtn">
                Block Main Thread for 5 Seconds
            </button>
            <button id="normalBtn">
                Check Main Thread
            </button>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
